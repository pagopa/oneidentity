name: Release
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  check-changeset:
    name: Check Changeset
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          fetch-depth: 0
        
      - name: Check for changeset file
        id: changeset-check
        run: |
          if git diff --name-only origin/$GITHUB_BASE_REF...HEAD | grep -q '^\.changeset/.*\.md$'; then
            echo "has_changeset=true" >> $GITHUB_OUTPUT
          else
            echo "has_changeset=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          
      - name: Manage 'missing changeset' label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HAS_CHANGESET: ${{ steps.changeset-check.outputs.has_changeset }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh label create "missing changeset" --color "199FD6" --description "missing changeset in the pr" --force 2>/dev/null || true
          if [ "$HAS_CHANGESET" == "false" ]; then
            gh pr edit $PR_NUMBER --add-label "missing changeset"
          else
            gh pr edit $PR_NUMBER --remove-label "missing changeset" || true
          fi

  release:
    name: Release
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 https://github.com/actions/setup-node/releases/tag/v6.4.0
        with:
          node-version: 24.x

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@06245a4e0a36c064a573d4150030f5ec548e4fcc # v1.4.10 https://github.com/changesets/action/releases/tag/v1.4.10
        with:
          version: yarn run version
          publish: yarn changeset tag
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
