server {
  listen 80;
  server_name oneid.local;

  client_max_body_size 10m;

  # Public snapshots mirror the S3-backed production routes.
  location = /idps {
    root /runtime/public-assets;
    try_files /idps.json =404;
    default_type application/json;
  }

  location = /clients {
    root /runtime/public-assets;
    try_files /clients.json =404;
    default_type application/json;
  }

  location ~ ^/clients/(?<client_id>[A-Za-z0-9_-]+)$ {
    root /runtime/public-assets;
    try_files /clients-publisher/$client_id.json =404;
    default_type application/json;
  }

  # Backend API and auth routes served by oneid-ecs-core.
  location ~ ^/(oidc|authorize|logout|metadata|health|saml) {
    proxy_pass http://oneid-ecs-core:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Frontend app and Vite HMR websocket traffic served by oneid-fe.
  location ~ ^/(login|assets) {
    proxy_pass http://oneid-fe:5173;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
  # Frontend app and Vite HMR websocket traffic served by oneid-fe.
  location / {
    proxy_pass http://oneid-fe:5173;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
  location /client {
    proxy_pass http://oneid-dummy-client:8084;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
  location /idp/ {
    proxy_pass http://oneid-ecs-internal-idp:8082/;
    proxy_redirect / /idp/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
}
