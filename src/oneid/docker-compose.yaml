services:
  oneid-aws-local:
    image: "ministackorg/ministack:latest@sha256:3a8d16f02b1842623fe8d0759098886fab4ca78b63280bdad70777ec472570c1"
    ports:
      - "4566:4566"
    container_name: oneid-aws-local
    environment:
      - SERVICES=ssm,s3,dynamodb,kms
      - DEBUG=1
      - EDGE_PORT=4566
      - START_WEB=0
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
  oneid-services-seeder:
    depends_on:
      oneid-aws-local:
        condition: service_started
    links:
      - oneid-aws-local
    build:
      context: ./
      dockerfile: docker_mock/oneid-aws-seed/Dockerfile
    volumes:
      - ${PWD}/docker_mock/oneid-aws-seed:/home/aws:ro
      - oneid-runtime:/runtime
    container_name: oneid-services-seeder
    entrypoint: ["/bin/bash", "/home/aws/oneid-seeder.sh"]
    environment:
      AWS_ACCESS_KEY_ID: "DUMMYIDEXAMPLE"
      AWS_SECRET_ACCESS_KEY: "DUMMYEXAMPLEKEY"
  oneid-ecs-core:
    build:
      context: ./
      dockerfile: oneid-ecs-core/Dockerfile
      args:
        ENVIRONMENT: local
        SKIP_DEPCHECK: true
    container_name: oneid-ecs-core
    depends_on:
      oneid-services-seeder:
        condition: service_completed_successfully
      oneid-aws-local:
        condition: service_started
    links:
      - oneid-aws-local
    environment:
      AWS_ACCESS_KEY_ID: "DUMMYIDEXAMPLE"
      AWS_SECRET_ACCESS_KEY: "DUMMYEXAMPLEKEY"
      QUARKUS_PROFILE: dev
      REGION: "eu-south-1"
      AWS_REGION: "eu-south-1"
      QUARKUS_SSM_ENDPOINT_OVERRIDE: "http://oneid-aws-local:4566"
      QUARKUS_DYNAMODB_ENDPOINT_OVERRIDE: "http://oneid-aws-local:4566"
      QUARKUS_KMS_ENDPOINT_OVERRIDE: "http://oneid-aws-local:4566"
      SIGN_JWT_KEY_ALIAS: "alias/sign-jwt"
      SIGN_JWT_KEY_ID: "1234"
      BASE_PATH: "http://localhost:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/q/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
  oneid-ecs-internal-idp:
    build:
      context: ./
      dockerfile: oneid-ecs-internal-idp/Dockerfile
      args:
        ENVIRONMENT: local
        SKIP_DEPCHECK: true
        IDP_ASSETS_BASE_URL: '/idp/assets'
    container_name: oneid-ecs-internal-idp
    depends_on:
      oneid-services-seeder:
        condition: service_completed_successfully
      oneid-aws-local:
        condition: service_started
    links:
      - oneid-aws-local
    environment:
      AWS_ACCESS_KEY_ID: "DUMMYIDEXAMPLE"
      AWS_SECRET_ACCESS_KEY: "DUMMYEXAMPLEKEY"
      QUARKUS_PROFILE: dev
      REGION: "eu-south-1"
      AWS_REGION: "eu-south-1"
      QUARKUS_SSM_ENDPOINT_OVERRIDE: "http://oneid-aws-local:4566"
      QUARKUS_DYNAMODB_ENDPOINT_OVERRIDE: "http://oneid-aws-local:4566"
      IDP_LOGIN_ENDPOINT: "/idp/login"
      IDP_CONSENT_ENDPOINT: "/idp/consent"
      ACS_ENDPOINT: "http://localhost:8080/saml/acs"
      ISSUER: "http://localhost:8080/idp/"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/q/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
  oneid-fe:
    image: node:24-alpine@sha256:d1b3b4da11eefd5941e7f0b9cf17783fc99d9c6fc34884a665f40a06dbdfc94f
    container_name: oneid-fe
    working_dir: /app
    command: >-
      sh -c "
      yarn install --frozen-lockfile --network-timeout 600000 && break;
      yarn start --host 0.0.0.0 --port 5173"
    volumes:
      - ${PWD}/oneid-fe:/app
      - oneid-fe-node-modules:/app/node_modules
    depends_on:
      oneid-ecs-core:
        condition: service_healthy
    expose:
      - "5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/login >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
  oneid-gateway:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    container_name: oneid-gateway
    depends_on:
      oneid-fe:
        condition: service_healthy
      oneid-ecs-core:
        condition: service_healthy
      oneid-ecs-internal-idp:
        condition: service_healthy
      oneid-dummy-client:
        condition: service_healthy
      oneid-lambda-client-registration:
        condition: service_started
    volumes:
      - ${PWD}/docker_mock/oneid-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
  oneid-lambda-client-registration:
    build:
      context: ./
      dockerfile: oneid-lambda-client-registration/Dockerfile
      args:
        SKIP_DEPCHECK: true
    container_name: oneid-lambda-client-registration
    volumes:
      - mvncache:/jboss/.m2
    ports:
      - "8081:8080"
    depends_on:
      oneid-services-seeder:
        condition: service_completed_successfully
      oneid-aws-local:
        condition: service_started
    links:
      - "oneid-aws-local"
    environment:
      AWS_ACCESS_KEY_ID: "DUMMYIDEXAMPLE"
      AWS_SECRET_ACCESS_KEY: "DUMMYEXAMPLEKEY"
      REGION: "eu-south-1"
      QUARKUS_DYNAMODB_ENDPOINT_OVERRIDE: "http://oneid-aws-local:4566"
      QUARKUS_PROFILE: dev
  oneid-dummy-client:
    build:
      context: ./
      dockerfile: docker_mock/dummy_client/Dockerfile
    depends_on:
      oneid-services-seeder:
        condition: service_completed_successfully
      oneid-ecs-core:
        condition: service_healthy
    container_name: oneid-dummy-client
    entrypoint: ["/bin/sh", "-c", "set -a && . /runtime/dummy-client.env && set +a && exec python3 oneid_dummy_client.py"]
    links:
      - oneid-ecs-core
    volumes:
      - oneid-runtime:/runtime:ro
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8084/client/login >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
volumes:
  mvncache:
  oneid-fe-node-modules:
  oneid-runtime:
